name: TVBox Decrypt

于:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发：每天北京时间 20:00 和 08:00 (UTC 12:00 和 00:00)
  schedule:
    - cron: '0 12 * * *'   # UTC 12:00 = 北京时间 20:00
    - cron: '0 0 * * *'    # UTC 00:00 = 北京时间 08:00

  # 当关键文件变更时触发
  push:
    分支: [ main, master ]
    paths:
      - 'url.txt'
      - 'decrypt.py'
      - '.github/workflows/decrypt.yml'

jobs:
  decrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pycryptodome
        
    - name: Run decrypt script
      id: decrypt
      run: |
        echo "Starting decryption..."
        python decrypt.py
        echo "Decryption completed"
        
    - name: Check output files
      run: |
        echo "Checking generated files..."
        if [ -f "live.txt" ]; then
          echo "✅ live.txt exists"
          wc -l live.txt
          ls -lh live.txt
        else
          echo "❌ live.txt not found"
        fi
        
        if [ -f "live_report.json" ]; then
          echo "✅ live_report.json exists"
          ls -lh live_report.json
        else
          echo "⚠️ live_report.json not found"
        fi
        
    - name: Commit and push results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查文件是否有变化
        git add -A
        if git diff --cached --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "🔓 Auto-decrypt TVBox interfaces [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push
          echo "✅ Results committed and pushed"
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: decrypt-results-${{ github.run_number }}
        path: |
          live.txt
          live_report.json
        retention-days: 30
        if-no-files-found: warn 
